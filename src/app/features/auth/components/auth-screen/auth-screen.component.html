<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
      </div>
      <h2>BuJo Focus</h2>
      <p>Organize sua mente, recupere seu tempo.</p>
    </div>

    <div class="auth-actions">
      <!-- Login with Google -->
      <button class="btn btn-google" (click)="loginWithGoogle()" [disabled]="loading">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com o Google
      </button>

      <div class="divider">
        <span>ou use seu e-mail (sem senha)</span>
      </div>

      <!-- Magic Link Form -->
      <form class="auth-form" (ngSubmit)="loginWithEmail()">
        <input 
          type="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="seu@email.com" 
          required
          [disabled]="loading"
        >
        <button type="submit" class="btn btn-primary" [disabled]="loading || !email">
          {{ loading ? 'Enviando...' : 'Receber Link de Acesso' }}
        </button>
      </form>

      <!-- Offline Mode -->
      <button class="btn btn-outline mt-4" (click)="continueOffline()" [disabled]="loading">
        Continuar Offline (Sem Nuvem)
      </button>
      <p class="auth-hint">No modo offline seus dados ficam salvos apenas neste navegador.</p>
    </div>
  </div>
</div>
